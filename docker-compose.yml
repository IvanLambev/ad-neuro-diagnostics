services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ADND_HOST_DATA_ROOT:-./runtime/data}:/data
      - ${ADND_HOST_REFERENCE_WORKSPACE:-./runtime/reference/workspace_small}:/data/reference/workspace_small:ro
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: celery -A backend.celery_app:celery_app worker --loglevel=INFO --queues=gpu --concurrency=1
    env_file:
      - .env.backend
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ADND_HOST_DATA_ROOT:-./runtime/data}:/data
      - ${ADND_HOST_REFERENCE_WORKSPACE:-./runtime/reference/workspace_small}:/data/reference/workspace_small:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adnd
      POSTGRES_USER: adnd
      POSTGRES_PASSWORD: adnd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

