services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    entrypoint: ["/app/docker/backend-entrypoint.sh"]
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ADND_HOST_DATA_ROOT:-./runtime/data}:/data
      - ${ADND_HOST_REFERENCE_WORKSPACE:-./runtime/reference/workspace_small}:/data/reference/workspace_small:ro
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: celery -A backend.celery_app:celery_app worker --loglevel=INFO --queues=gpu --concurrency=1
    env_file:
      - .env.backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${ADND_HOST_DATA_ROOT:-./runtime/data}:/data
      - ${ADND_HOST_REFERENCE_WORKSPACE:-./runtime/reference/workspace_small}:/data/reference/workspace_small:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${ADND_POSTGRES_DB:?Set ADND_POSTGRES_DB in .env.backend}
      POSTGRES_USER: ${ADND_POSTGRES_USER:?Set ADND_POSTGRES_USER in .env.backend}
      POSTGRES_PASSWORD: ${ADND_POSTGRES_PASSWORD:?Set ADND_POSTGRES_PASSWORD in .env.backend}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
